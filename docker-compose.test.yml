version: "3.9"

services:

  db-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ticketfast_test
    tmpfs:
      - /var/lib/postgresql/data       
    ports:
      - "5433:5432"                   

  api-test:
    build: .
    command: uvicorn src.reservas.api:app --host 0.0.0.0 --port 8001
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db-test:5432/ticketfast_test
    ports:
      - "8001:8001"
    depends_on:
      - db-test